apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozlive-web
  namespace: cozlive
  labels:
    app: cozlive-web
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cozlive-web
  template:
    metadata:
      labels:
        app: cozlive-web
        tier: frontend
    spec:
      containers:
      - name: web
        image: cozlive/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.cozlive.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cozlive-web-service
  namespace: cozlive
spec:
  selector:
    app: cozlive-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cozlive-web-ingress
  namespace: cozlive
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - cozlive.com
    - www.cozlive.com
    secretName: cozlive-tls
  rules:
  - host: cozlive.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cozlive-web-service
            port:
              number: 80
  - host: www.cozlive.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cozlive-web-service
            port:
              number: 80
