version: '3.8'

services:
  # PostgreSQL - 主数据库
  postgres:
    image: postgres:15-alpine
    container_name: cozlive-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cozlive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cozlive123}
      POSTGRES_DB: ${POSTGRES_DB:-cozlive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cozlive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozlive-network

  # Redis - 缓存与会话
  redis:
    image: redis:7-alpine
    container_name: cozlive-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-cozlive123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozlive-network

  # MongoDB - 消息与日志
  mongodb:
    image: mongo:7
    container_name: cozlive-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-cozlive}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cozlive123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-cozlive}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozlive-network

  # Kafka - 消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cozlive-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cozlive-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cozlive-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - cozlive-network

  # MinIO - 对象存储
  minio:
    image: minio/minio:latest
    container_name: cozlive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-cozlive}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-cozlive123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cozlive-network

  # Elasticsearch - 搜索引擎
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cozlive-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - cozlive-network

  # Chroma - 向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: cozlive-chroma
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - cozlive-network

  # Prometheus - 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: cozlive-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cozlive-network

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: cozlive-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - cozlive-network

  # API Gateway
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: cozlive-api-gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://:cozlive123@redis:6379/0
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres
    networks:
      - cozlive-network

  # User Service
  user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    container_name: cozlive-user-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://cozlive:cozlive123@postgres:5432/cozlive
      - REDIS_URL=redis://:cozlive123@redis:6379/0
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cozlive-network

  # AI Agent Engine
  ai-agent-engine:
    build:
      context: ../../services/ai-agent-engine
      dockerfile: Dockerfile
    container_name: cozlive-ai-agent-engine
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://cozlive:cozlive123@postgres:5432/cozlive
      - REDIS_URL=redis://:cozlive123@redis:6379/0
      - MONGODB_URL=mongodb://cozlive:cozlive123@mongodb:27017/cozlive
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - cozlive-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  minio_data:
  elasticsearch_data:
  chroma_data:
  prometheus_data:
  grafana_data:

networks:
  cozlive-network:
    driver: bridge
