version: '3.8'

services:
  # PostgreSQL - 主数据库
  postgres:
    image: postgres:15-alpine
    container_name: cozlive-postgres
    environment:
      POSTGRES_USER: cozlive
      POSTGRES_PASSWORD: cozlive123
      POSTGRES_DB: cozlive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozlive"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozlive-network

  # Redis - 缓存与会话
  redis:
    image: redis:7-alpine
    container_name: cozlive-redis
    command: redis-server --appendonly yes --requirepass cozlive123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cozlive123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozlive-network

  # MongoDB - 消息与日志
  mongodb:
    image: mongo:7
    container_name: cozlive-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: cozlive
      MONGO_INITDB_ROOT_PASSWORD: cozlive123
      MONGO_INITDB_DATABASE: cozlive
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozlive-network

  # Kafka - 消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cozlive-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cozlive-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cozlive-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - cozlive-network

  # MinIO - 对象存储
  minio:
    image: minio/minio:latest
    container_name: cozlive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cozlive
      MINIO_ROOT_PASSWORD: cozlive123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cozlive-network

  # Chroma - 向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: cozlive-chroma
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - cozlive-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  minio_data:
  chroma_data:

networks:
  cozlive-network:
    driver: bridge
